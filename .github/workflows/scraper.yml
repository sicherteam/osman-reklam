name: LSA Lead Scraper Automation

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Repoya yazma izni
permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Repositori Kodlarını Çek
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Google Chrome Kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: NPM Bağımlılıklarını Yükle
        run: npm install

      - name: Scraper Scriptini Çalıştır
        env:
          GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
        run: node scraper.js

      - name: data.json Dosyasını Repoya Commit Et
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automated update: data.json" || exit 0
          git push
