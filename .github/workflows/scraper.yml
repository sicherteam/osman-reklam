name: LSA Lead Scraper Automation

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write


jobs:
  run-scraper:

    runs-on: ubuntu-latest

    steps:

      - name: Repository Kodlarını Çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Chrome Profil Cache Geri Yükle
        uses: actions/cache@v4
        with:
          path: chrome-profile
          key: chrome-profile-${{ runner.os }}-v1
          restore-keys: |
            chrome-profile-${{ runner.os }}-


      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '24'


      - name: Google Chrome Kurulumu
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable


      - name: NPM Bağımlılıklarını Yükle
        run: |
          npm install puppeteer-extra puppeteer-extra-plugin-stealth


      - name: Chrome Profil ve Cookie Hazırlığı + Scraper Çalıştırma
        env:
          GOOGLE_COOKIES_SECRET: ${{ secrets.GOOGLE_COOKIES }}

        run: |

          echo "🔍 Chrome profil kontrol ediliyor..."

          if [ -d "chrome-profile" ]; then
            echo "✅ Mevcut Chrome profili bulundu."
          else
            echo "🆕 Yeni Chrome profili oluşturulacak."
          fi


          echo "🍪 Cookie kontrol ediliyor..."

          if [ -f "updated_cookies.json" ]; then

            echo "✅ Güncel cookie dosyası kullanılıyor."

            export GOOGLE_COOKIES="$(cat updated_cookies.json)"

          else

            echo "🔐 GitHub Secret cookie kullanılıyor."

            export GOOGLE_COOKIES="$GOOGLE_COOKIES_SECRET"

          fi


          echo "🚀 Scraper başlatılıyor..."

          node scraper.js



      - name: Chrome Profil Cache Kaydet
        uses: actions/cache@v4
        with:
          path: chrome-profile
          key: chrome-profile-${{ runner.os }}-v1



      - name: Änderungen Commit und Push

        run: |

          git config --global user.name "github-actions[bot]"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"


          echo "📦 Dateien werden vorbereitet..."


          git add data.json


          if git diff --cached --quiet; then

            echo "ℹ️ Keine Änderungen vorhanden."

            exit 0

          fi


          git commit -m "Automated update: LSA data"


          git pull --rebase origin main


          git push origin main
