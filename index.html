<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSA Lead Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { 
      background-color: #f4f6f9; 
      padding: 15px 10px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }

    /* Ana Kart - Orijinal Temiz Tasarım */
    .main-card { 
      border: 1px solid #e1e8f0; 
      border-radius: 16px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
      background: #ffffff !important; 
    }

    /* Tablo Tasarımı */
    .table {
      color: #1e293b;
    }

    .table th { 
      background-color: #1e293b !important; 
      color: #fff !important; 
      border: none; 
      padding: 14px; 
    }

    .badge-status { 
      font-size: 0.85em; 
      padding: 6px 12px; 
      border-radius: 20px; 
      font-weight: 600; 
      display: inline-block;
    }

    .bg-belastet { background-color: #d1e7dd; color: #0f5132; }
    .bg-pruefung { background-color: #fff3cd; color: #664d03; }
    .bg-nicht { background-color: #f8d7da; color: #842029; }
    .bg-default { background-color: #e2e3e5; color: #41464b; }
    #countdown-box { display: none; }

    /* Mesaj Kutusu Stili */
    .message-box {
      background-color: #f8fafc;
      border-left: 4px solid #0d6efd;
      border-radius: 6px;
      padding: 10px 12px;
      margin-top: 8px;
      white-space: pre-line;
    }

    /* --- MOBİL UYUM ÖZELLEŞTİRMELERİ --- */
    @media (max-width: 767.98px) {
      body { padding: 10px 5px; }
      .main-card { padding: 1.25rem !important; border-radius: 12px; }
      
      .desktop-table-view { display: none !important; }
      .mobile-cards-view { display: flex; flex-direction: column; gap: 12px; }
      
      .lead-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      }
      .lead-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 1px solid #f1f5f9;
        padding-bottom: 8px;
        margin-bottom: 10px;
      }
      .lead-card-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        font-size: 0.9em;
      }
      .lead-card-label { color: #64748b; font-weight: 500; }
      .lead-card-value { font-weight: 600; color: #1e293b; text-align: right; }
    }

    @media (min-width: 768px) {
      .mobile-cards-view { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="container main-card p-4">
    <!-- Header Alanı -->
    <div class="row g-3 align-items-center mb-3">
      <div class="col-12 col-md-6">
        <h2 class="fw-bold mb-1 fs-3">OSMAN REKLAMLAR</h2>
        <div class="text-muted small">
          <strong>Letzte Aktualisierung:</strong> <span id="last-update" class="text-primary fw-bold">Yükleniyor...</span>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="d-flex flex-column flex-sm-row gap-2">
          <input type="text" id="searchInput" onkeyup="filterTable()" class="form-control" placeholder="Suchen (Telefon, Ort, Nachricht...)...">
          <button id="btn-refresh" onclick="startLiveScrape()" class="btn btn-primary text-nowrap">
            🔄 Daten neu laden
          </button>
        </div>
      </div>
    </div>

    <!-- Geri Sayım Kutusu -->
    <div id="countdown-box" class="alert alert-info align-items-center justify-content-between mb-3">
      <div>
        <strong>🤖 Prüfe auf neue Daten...</strong>
        <div class="small text-muted d-block d-sm-inline">data.json wird neu geladen.</div>
      </div>
      <div class="fw-bold fs-4 text-primary ms-2"><span id="timer">10</span>s</div>
    </div>

    <!-- MASAÜSTÜ TABLO GÖRÜNÜMÜ -->
    <div class="table-responsive desktop-table-view">
      <table class="table align-middle" id="leadTable">
        <thead>
          <tr>
            <th>Telefon</th>
            <th>Hizmet</th>
            <th>Konum</th>
            <th>Durum</th>
            <th>Tarih</th>
            <th>Aksiyon</th>
          </tr>
        </thead>
        <tbody id="lead-table-body">
          <tr><td colspan="6" class="text-center py-4">Veriler yükleniyor...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- MOBİL KART GÖRÜNÜMÜ -->
    <div id="lead-cards-body" class="mobile-cards-view">
      <div class="text-center text-muted py-4">Veriler yükleniyor...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function cleanMessageText(text) {
      if (!text || text === '-' || text.trim() === '') return null;
      
      let cleaned = text
        .split('Wird geladen')[0]
        .split('Audioinhalte')[0]
        .split('Hier dem Kunden')[0]
        .replace(/^P\n+/g, '')
        .replace(/^\d{2}\.\d{2}\.\d{2}\n+/g, '')
        .trim();

      return cleaned.length > 0 ? cleaned : null;
    }

    async function loadData() {
      const tbody = document.getElementById('lead-table-body');
      const cardsBody = document.getElementById('lead-cards-body');
      const updateSpan = document.getElementById('last-update');

      try {
        const response = await fetch('./data.json?t=' + new Date().getTime(), {
          cache: 'no-cache'
        });

        if (!response.ok) {
          throw new Error(`HTTP Hata kodu: ${response.status}`);
        }

        const data = await response.json();
        updateSpan.innerText = data.updatedAt || 'Unbekannt';

        tbody.innerHTML = '';
        cardsBody.innerHTML = '';

        if (!data.leads || data.leads.length === 0) {
          const emptyMsg = '<div class="text-center py-4 text-muted">Keine Daten vorhanden.</div>';
          tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">Keine Daten vorhanden.</td></tr>`;
          cardsBody.innerHTML = emptyMsg;
          return;
        }

        data.leads.forEach((lead, index) => {
          let rawStatus = lead.status || '';
          let cleanStatus = rawStatus.split('\n')[0].trim();
          
          let badgeClass = 'bg-default';
          if (cleanStatus.includes('Belastet') && !cleanStatus.includes('Nicht')) {
            badgeClass = 'bg-belastet';
          } else if (cleanStatus.includes('überprüft')) {
            badgeClass = 'bg-pruefung';
          } else if (cleanStatus.includes('Nicht belastet')) {
            badgeClass = 'bg-nicht';
          }

          const cleanedMsg = cleanMessageText(lead.messageText);

          const msgButton = cleanedMsg ? `
            <button class="btn btn-sm btn-outline-primary" type="button" data-bs-toggle="collapse" data-bs-target="#msg-desktop-${index}">
              💬 Nachricht
            </button>
          ` : '<span class="text-muted small">-</span>';

          const row = `
            <tr>
              <td><a href="tel:${lead.phone}" class="fw-bold text-decoration-none">${lead.phone}</a></td>
              <td>${lead.jobType || '-'}</td>
              <td>${lead.location || '-'}</td>
              <td><span class="badge badge-status ${badgeClass}">${cleanStatus}</span></td>
              <td class="text-muted small">${lead.date || '-'}</td>
              <td>${msgButton}</td>
            </tr>
            ${cleanedMsg ? `
              <tr class="collapse" id="msg-desktop-${index}">
                <td colspan="6" class="p-3">
                  <div class="message-box">
                    <strong class="text-primary small d-block mb-1">💬 Kundennachricht:</strong>
                    <div class="small text-dark">${cleanedMsg}</div>
                  </div>
                </td>
              </tr>
            ` : ''}
          `;
          tbody.innerHTML += row;

          const mobileMsgHTML = cleanedMsg ? `
            <div class="message-box mt-2">
              <strong class="text-primary small d-block mb-1">💬 Nachricht:</strong>
              <div class="small text-dark">${cleanedMsg}</div>
            </div>
          ` : '';

          const card = `
            <div class="lead-card searchable-item">
              <div class="lead-card-header">
                <div>
                  <a href="tel:${lead.phone}" class="fw-bold fs-6 text-decoration-none text-primary d-block">
                    📞 ${lead.phone}
                  </a>
                  <small class="text-muted">${lead.date || '-'}</small>
                </div>
                <span class="badge badge-status ${badgeClass}">${cleanStatus}</span>
              </div>
              <div class="lead-card-row">
                <span class="lead-card-label">Hizmet:</span>
                <span class="lead-card-value">${lead.jobType || '-'}</span>
              </div>
              <div class="lead-card-row">
                <span class="lead-card-label">Konum:</span>
                <span class="lead-card-value">${lead.location || '-'}</span>
              </div>
              ${mobileMsgHTML}
            </div>
          `;
          cardsBody.innerHTML += card;
        });

      } catch (err) {
        console.error("Yükleme hatası:", err);
        updateSpan.innerText = 'Fehler beim Laden';
        const errorMsg = `Veri okunamadı: ${err.message}`;
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">${errorMsg}</td></tr>`;
        cardsBody.innerHTML = `<div class="text-center text-danger py-4">${errorMsg}</div>`;
      }
    }

    function startLiveScrape() {
      const btn = document.getElementById('btn-refresh');
      const box = document.getElementById('countdown-box');
      const timerSpan = document.getElementById('timer');

      btn.disabled = true;
      box.style.display = 'flex';

      let timeLeft = 10;
      timerSpan.innerText = timeLeft;

      const countdown = setInterval(() => {
        timeLeft--;
        timerSpan.innerText = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(countdown);
          box.style.display = 'none';
          btn.disabled = false;
          loadData();
        }
      }, 1000);
    }

    function filterTable() {
      const input = document.getElementById('searchInput');
      const filter = input.value.toLowerCase();
      
      const rows = document.querySelectorAll('#lead-table-body tr');
      rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? '' : 'none';
      });

      const cards = document.querySelectorAll('#lead-cards-body .searchable-item');
      cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(filter) ? '' : 'none';
      });
    }

    loadData();
  </script>
</body>
</html>
